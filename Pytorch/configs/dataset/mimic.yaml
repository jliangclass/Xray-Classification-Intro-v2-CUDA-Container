# ASU Research Cluster
# MIMIC-CXR Dataset Configuration
#
# Dataset Statistics:
# - Total Files (train/val/test): 377,031
# - Full size: ~575 GB
# - Scaled 1024x1024: ~100 GB
# - Scaled 256x256: ~12.8 GB

name: MIMIC

# Define dataset root path (defaults to global dataset_dir, can be overridden individually via dataset.dataset_root=...)
dataset_root: ${dataset_dir}

train_image_root: "${dataset.dataset_root}/MIMIC_jpeg/physionet.org/files/mimic-cxr-jpg/2.0.0"
val_image_root: "${dataset.dataset_root}/MIMIC_jpeg/physionet.org/files/mimic-cxr-jpg/2.0.0"
test_image_root: "${dataset.dataset_root}/MIMIC_jpeg/physionet.org/files/mimic-cxr-jpg/2.0.0"

train_ann: data/mimic_cxr/train.csv
val_ann: data/mimic_cxr/val.csv
test_ann: data/mimic_cxr/test.csv
image_path_key: image_path

labels:
  - Atelectasis
  - Cardiomegaly
  - Consolidation
  - Edema
  - Enlarged Cardiomediastinum
  - Fracture
  - Lung Lesion
  - Lung Opacity
  - No Finding
  - Pleural Effusion
  - Pleural Other
  - Pneumonia
  - Pneumothorax
  - Support Devices
num_classes: 14

test_labels:
  top5:
    - Atelectasis
    - Cardiomegaly
    - Consolidation
    - Edema
    - Pleural Effusion
  top12:
    - Atelectasis
    - Cardiomegaly
    - Consolidation
    - Edema
    - Enlarged Cardiomediastinum
    - Fracture
    - Lung Lesion
    - Lung Opacity
    - Pleural Effusion
    - Pleural Other
    - Pneumonia
    - Pneumothorax

test_diseases_name:
  - Atelectasis
  - Cardiomegaly
  - Consolidation
  - Edema
  - Pleural Effusion

task_type: multi-label classification
